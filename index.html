<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地月专属 · 领域四级词库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Special+Elite&family=Orbitron:wght@400;700;900&family=Major+Mono+Display&family=Fira+Code:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0f;font-family:'Noto Serif SC',serif;overflow-x:hidden;color:#e0dcd0}
:root{
  --bg:#0a0a0f;--surface:#14141e;--surface2:#1c1c2a;--text:#e0dcd0;--text2:#908a78;
  --df-red:#c62828;--df-gold:#b8860b;--df-accent:#ff4444;
  --fgo-gold:#d4a017;--fgo-blue:#1a237e;--fgo-accent:#ffd54f;
  --dev-green:#00ff41;--dev-bg:#0d1117;--dev-accent:#58a6ff;
  --mys-purple:#7b2d8e;--mys-silver:#c0c0c0;--mys-accent:#bb86fc;
}
/* ── Load screen ── */
#load{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .6s}
#load.hide{opacity:0;pointer-events:none}
.load-ring{width:64px;height:64px;border:3px solid #2a2a3e;border-top-color:var(--dev-green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Landing ── */
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative}
#landing .title{font-size:clamp(1.8rem,5vw,3.2rem);text-align:center;margin-bottom:8px}
#landing .title span{display:block;font-size:clamp(.85rem,2vw,1.1rem);color:var(--text2);font-weight:400;margin-top:8px;letter-spacing:2px}
#landing .title .em{color:var(--dev-green);font-family:'Major Mono Display',monospace}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1080px;width:100%;margin-top:48px}
.deck-card{position:relative;border-radius:16px;padding:32px 24px 24px;cursor:pointer;transition:all .4s cubic-bezier(.22,1,.36,1);overflow:hidden;border:1px solid transparent;min-height:200px;display:flex;flex-direction:column;justify-content:flex-end}
.deck-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .4s;border-radius:16px}
.deck-card:hover{transform:translateY(-8px) scale(1.02)}
.deck-card:hover::before{opacity:1}
.deck-card .icon{font-size:2.4rem;margin-bottom:12px;position:relative;z-index:1}
.deck-card h2{font-size:1.3rem;position:relative;z-index:1}
.deck-card p{font-size:.8rem;color:var(--text2);margin-top:6px;position:relative;z-index:1}
.deck-card .count{position:absolute;top:16px;right:20px;font-size:.75rem;opacity:.5;font-family:'Fira Code',monospace}

/* Deck themes */
.df-theme{background:linear-gradient(145deg,#1a0a0a,#0d0505);border-color:#3a1515}
.df-theme::before{background:linear-gradient(135deg,rgba(198,40,40,.15),transparent)}
.df-theme:hover{border-color:var(--df-red);box-shadow:0 12px 40px rgba(198,40,40,.2)}
.df-theme .icon{color:var(--df-red)}

.fgo-theme{background:linear-gradient(145deg,#0a0f2a,#05081a);border-color:#1a237e}
.fgo-theme::before{background:linear-gradient(135deg,rgba(212,160,23,.1),transparent)}
.fgo-theme:hover{border-color:var(--fgo-gold);box-shadow:0 12px 40px rgba(212,160,23,.2)}
.fgo-theme .icon{color:var(--fgo-gold)}

.dev-theme{background:linear-gradient(145deg,#0d1117,#06090f);border-color:#1a2a1a}
.dev-theme::before{background:linear-gradient(135deg,rgba(0,255,65,.08),transparent)}
.dev-theme:hover{border-color:var(--dev-green);box-shadow:0 12px 40px rgba(0,255,65,.15)}
.dev-theme .icon{color:var(--dev-green)}

.mys-theme{background:linear-gradient(145deg,#120824,#080412);border-color:#2a1a3a}
.mys-theme::before{background:linear-gradient(135deg,rgba(123,45,142,.15),transparent)}
.mys-theme:hover{border-color:var(--mys-purple);box-shadow:0 12px 40px rgba(123,45,142,.25)}
.mys-theme .icon{color:var(--mys-accent)}

/* ── Game View ── */
#game{display:none;min-height:100vh;padding:20px}
#game.active{display:block}

/* Header */
.game-header{display:flex;align-items:center;gap:16px;padding:16px 0;max-width:1080px;margin:0 auto 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.game-header .back{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:8px;transition:color .3s;font-family:inherit}
.game-header .back:hover{color:var(--text)}
.game-header h1{font-size:1.4rem;flex:1}
.game-header h1 small{display:block;font-size:.75rem;color:var(--text2);font-weight:400}
.game-stats{display:flex;gap:16px;font-size:.8rem;font-family:'Fira Code',monospace;color:var(--text2)}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;max-width:1080px;margin:0 auto 24px}
.filter-bar .tag{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 16px;font-size:.78rem;cursor:pointer;transition:all .3s;color:var(--text2);font-family:inherit}
.filter-bar .tag:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.filter-bar .tag.active{background:var(--surface2);border-color:currentColor;color:var(--text)}

/* Card Grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;max-width:1080px;margin:0 auto;perspective:1000px}
.card-wrap{aspect-ratio:3/4;cursor:pointer;perspective:800px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.22,1,.36,1);transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;border:1px solid rgba(255,255,255,.08);overflow:hidden}
.card-front{background:var(--surface)}
.card-front .word{font-size:1.15rem;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.card-front .pos{font-size:.7rem;opacity:.5;font-family:'Fira Code',monospace}
.card-back{transform:rotateY(180deg);background:var(--surface2);gap:6px}
.card-back .def{font-size:.85rem;line-height:1.5;color:var(--text)}
.card-back .ex{font-size:.72rem;color:var(--text2);line-height:1.5;margin-top:4px;font-style:italic}
.card-back .themed-tag{position:absolute;top:8px;right:10px;font-size:.6rem;padding:2px 8px;border-radius:10px;opacity:.7;font-family:'Fira Code',monospace}

/* Theme-specific card styles */
.df-card .card-front{background:linear-gradient(180deg,#1a0808,#0f0404);border-color:#3a1515}
.df-card .card-back{background:linear-gradient(180deg,#1a0a0a,#120606);border-color:#4a2020}
.df-card .card-back .def{color:#ffaaaa}
.df-card .themed-tag{background:rgba(198,40,40,.3);color:var(--df-red)}

.fgo-card .card-front{background:linear-gradient(180deg,#0a0f2a,#05081a);border-color:#1a237e}
.fgo-card .card-back{background:linear-gradient(180deg,#0c1230,#070a20);border-color:#2a307e}
.fgo-card .card-back .def{color:#ffe082}
.fgo-card .themed-tag{background:rgba(212,160,23,.25);color:var(--fgo-gold)}

.dev-card .card-front{background:linear-gradient(180deg,#0d1117,#080b10);border-color:#1a2a1a}
.dev-card .card-back{background:linear-gradient(180deg,#0f1419,#090c12);border-color:#2a3a2a}
.dev-card .card-back .def{color:#7affa0}
.dev-card .themed-tag{background:rgba(0,255,65,.15);color:var(--dev-green)}

.mys-card .card-front{background:linear-gradient(180deg,#120824,#0a0418);border-color:#2a1a3a}
.mys-card .card-back{background:linear-gradient(180deg:#140a28,#0c051e);border-color:#3a2a4a}
.mys-card .card-back .def{color:#d0a0ff}
.mys-card .themed-tag{background:rgba(123,45,142,.3);color:var(--mys-accent)}

/* ── Quiz Mode ── */
#quiz{display:none;min-height:100vh;padding:20px}
#quiz.active{display:block}
.quiz-box{max-width:640px;margin:80px auto;background:var(--surface);border-radius:20px;padding:48px 32px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.quiz-box .q-word{font-size:2rem;font-weight:700;margin-bottom:16px}
.quiz-box .q-pos{font-size:.8rem;color:var(--text2);margin-bottom:32px;font-family:'Fira Code',monospace}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto}
.quiz-options button{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;font-size:.9rem;color:var(--text);cursor:pointer;transition:all .3s;font-family:inherit}
.quiz-options button:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.quiz-options button.correct{background:rgba(0,255,65,.15);border-color:var(--dev-green)}
.quiz-options button.wrong{background:rgba(198,40,40,.15);border-color:var(--df-red)}
.quiz-result{margin-top:24px;font-size:1.1rem;min-height:2em}
.quiz-next{display:none;margin:24px auto 0;background:none;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 28px;color:var(--text);cursor:pointer;font-family:inherit;transition:all .3s}
.quiz-next:hover{background:var(--surface2);border-color:rgba(255,255,255,.25)}
.quiz-header{display:flex;align-items:center;gap:16px;max-width:640px;margin:0 auto 24px}
.quiz-header .back{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:8px;font-family:inherit}
.quiz-header .back:hover{color:var(--text)}
.quiz-header h1{font-size:1.2rem;flex:1}
.quiz-header .score{font-family:'Fira Code',monospace;font-size:.85rem;color:var(--text2)}

/* Buttons */
.action-row{display:flex;gap:12px;max-width:1080px;margin:24px auto 0;flex-wrap:wrap}
.action-row button{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 20px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .3s}
.action-row button:hover{background:var(--surface2);border-color:rgba(255,255,255,.2)}
.action-row .quiz-btn{background:rgba(123,45,142,.2);border-color:var(--mys-purple)}
.action-row .quiz-btn:hover{background:rgba(123,45,142,.35);box-shadow:0 0 20px rgba(123,45,142,.2)}
.action-row .reset-btn{background:rgba(198,40,40,.1);border-color:#3a1515}
.action-row .reset-btn:hover{background:rgba(198,40,40,.2)}

/* Progress bar */
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;max-width:1080px;margin:12px auto 0}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.22,1,.36,1);width:0%}
.df-progress .fill{background:var(--df-red)}
.fgo-progress .fill{background:var(--fgo-gold)}
.dev-progress .fill{background:var(--dev-green)}
.mys-progress .fill{background:var(--mys-accent)}

/* ── Responsive ── */
@media(max-width:600px){
  .deck-grid{grid-template-columns:1fr 1fr;gap:12px}
  .deck-card{min-height:160px;padding:20px 16px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .quiz-options{grid-template-columns:1fr}
  .quiz-box{padding:32px 20px;margin:40px auto}
}
</style>
</head>
<body>

<!-- Load Screen -->
<div id="load">
  <div class="load-ring"></div>
  <div style="font-size:.8rem;color:var(--text2);letter-spacing:2px;">建构领域词库中...</div>
</div>

<!-- ─── LANDING ─── -->
<section id="landing">
  <div class="title">
    🗂️ 地月专属 · 领域词库
    <span>四级词汇嵌入你的世界 · <span class="em">word</span> 即记忆</span>
  </div>
  <div class="deck-grid">
    <div class="deck-card df-theme" onclick="openDeck('darkfantasy')">
      <div class="icon">🗡️</div>
      <h2>黑暗幻想</h2>
      <p>血腥、献祭、裂缝中的低语——你笔下的世界</p>
      <span class="count">12 词</span>
    </div>
    <div class="deck-card fgo-theme" onclick="openDeck('fgo')">
      <div class="icon">⚔️</div>
      <h2>Fate/Grand Order</h2>
      <p>召唤、羁绊、宝具——迦勒底生存用语</p>
      <span class="count">12 词</span>
    </div>
    <div class="deck-card dev-theme" onclick="openDeck('devops')">
      <div class="icon">🖥️</div>
      <h2>运维 · 开发</h2>
      <p>隧道、守护进程、部署——数字领地的工具箱</p>
      <span class="count">12 词</span>
    </div>
    <div class="deck-card mys-theme" onclick="openDeck('mystic')">
      <div class="icon">🔮</div>
      <h2>神秘学 · 命理</h2>
      <p>奥义、占卜、星辰——通晓命运的语言</p>
      <span class="count">12 词</span>
    </div>
  </div>
</section>

<!-- ─── GAME ─── -->
<section id="game">
  <div class="game-header">
    <button class="back" onclick="backToLanding()">←</button>
    <h1 id="gameTitle">领域名 <small id="gameSubtitle">已掌握 0/12</small></h1>
    <div class="game-stats">
      <span id="seenCount">👁️ 0</span>
      <span id="masteredCount">⭐ 0</span>
    </div>
  </div>
  <div class="filter-bar" id="filterBar">
    <span class="tag active" data-filter="all" onclick="setFilter(this,'all')">全部</span>
    <span class="tag" data-filter="new" onclick="setFilter(this,'new')">📖 未翻</span>
    <span class="tag" data-filter="seen" onclick="setFilter(this,'seen')">👁️ 已阅</span>
    <span class="tag" data-filter="mastered" onclick="setFilter(this,'mastered')">⭐ 掌握</span>
  </div>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="action-row">
    <button onclick="startQuiz()" class="quiz-btn">🎯 测试模式</button>
    <button onclick="flipAll()">🔄 全部翻面</button>
    <button onclick="resetDeck()" class="reset-btn">🔄 重置进度</button>
  </div>
</section>

<!-- ─── QUIZ ─── -->
<section id="quiz">
  <div class="quiz-header">
    <button class="back" onclick="exitQuiz()">←</button>
    <h1>🎯 测试</h1>
    <span class="score" id="quizScore">0/0</span>
  </div>
  <div class="quiz-box" id="quizBox">
    <div class="q-word" id="qWord">word</div>
    <div class="q-pos" id="qPos">n.</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuiz()">下一题 →</button>
  </div>
</section>

<script>
/* ─── DATA ─── */
const DECKS = {
  darkfantasy: {
    name:'黑暗幻想', icon:'🗡️', theme:'df', progressClass:'df-progress',
    filterAccent:'var(--df-red)',
    words:[
      {word:'ritual',pos:'n.',def:'献祭仪式，一套带有目的性且通常血腥的固定行为',ex:'The cult performed its ritual under the eclipse, and the air thickened with copper.'},
      {word:'wound',pos:'n./v.',def:'（深处的）伤口；施加创伤',ex:'The wound gaped like a second mouth, its edges already blackening.'},
      {word:'crawl',pos:'v.',def:'（贴着地面）爬行，缓慢移动',ex:'He crawled across the blood-soaked flagstones, fingers leaving wet trails.'},
      {word:'blade',pos:'n.',def:'剑刃，刀锋',ex:'The blade caught the torchlight—a streak of hunger in the dark.'},
      {word:'sacrifice',pos:'n./v.',def:'献祭；牺牲品',ex:'Sacrifice was never a choice here. Only a matter of who bled first.'},
      {word:'shadow',pos:'n./v.',def:'暗影；投下阴影',ex:'The shadows moved against the torchlight—or was it the other way around?'},
      {word:'flesh',pos:'n.',def:'（人或动物的）血肉，肉体',ex:'The flesh rememberes every cut. The mind just learns to live with the memory.'},
      {word:'dread',pos:'n./v.',def:'深入骨髓的恐惧',ex:'A cold dread settled in his chest, heavier than any blade.'},
      {word:'hollow',pos:'adj./v.',def:'空洞的；（使）空虚',ex:'His eyes were hollow—not dead, just no longer home to anything human.'},
      {word:'fester',pos:'v.',def:'（伤口）化脓溃烂；（怨恨）郁积',ex:'The wound festered in the damp, and with it, his hatred.'},
      {word:'decay',pos:'n./v.',def:'腐朽，衰败',ex:'The castle smelled of decay—wet stone, rotting wood, something older.'},
      {word:'tremble',pos:'v.',def:'（因恐惧/寒冷）颤抖',ex:'Her hands trembled, but her voice did not. That was how he knew she\'d already won.'}
    ]
  },
  fgo:{
    name:'Fate/Grand Order', icon:'⚔️', theme:'fgo', progressClass:'fgo-progress',
    filterAccent:'var(--fgo-gold)',
    words:[
      {word:'summon',pos:'v.',def:'召唤（从者）',ex:'The summoning circle flared, and a new name was etched into Chaldea\'s records.'},

      {word:'craft',pos:'n./v.',def:'概念礼装 Craft Essence；精心制作',ex:'Limited CE. You spent 300 quartz for it. Worth every pull.'},
      {word:'essence',pos:'n.',def:'本质，精髓。礼装（CE=Concept Essence）',ex:'The essence of a servant is not their stats, but the story they carry.'},
      {word:'ascent',pos:'n.',def:'再临 Ascension；上升过程',ex:'Final ascent required—mats, QP, and that one gold gem that never drops.'},
      {word:'phantasm',pos:'n.',def:'幻想；Phantasm（宝具后缀）',ex:'A phantasm given form—the crystallized legend of a hero who never truly existed.'},
      {word:'vow',pos:'n./v.',def:'誓言，立约',ex:'The vow between master and servant outlasts the Grail itself.'},
      {word:'fortune',pos:'n.',def:'命运，运气；也指抽卡的结果',ex:'Gacha fortune: you either get spooked or scream at rainbow orbs.'},
      {word:'pray',pos:'v.',def:'祈祷；在卡池前的条件反射',ex:'I prayed before pulling. It didn\'t work. It never works.'}
    ]
  },
  devops:{
    name:'运维 · 开发', icon:'🖥️', theme:'dev', progressClass:'dev-progress',
    filterAccent:'var(--dev-green)',
    words:[
      {word:'execute',pos:'v.',def:'执行（命令/程序）',ex:'sudo ./deploy.sh — one line to execute, a lifetime to debug.'},
      {word:'transfer',pos:'v./n.',def:'传输，传送',ex:'Frp tunnel established. Data transfers at the speed of your uplink.'},
      {word:'monitor',pos:'v./n.',def:'监控；持续观察系统状态',ex:'Monitor CPU at 87% — something is eating your worker processes again.'},

      {word:'tunnel',pos:'n./v.',def:'隧道（frp/SSH）；建立隧道连接',ex:'A single frpc tunnel and your local dev server is accessible from anywhere.'},
      {word:'config',pos:'n./v.',def:'配置；配置文件',ex:'The config file is 400 lines long. Nobody knows what half of them do.'},
      {word:'proxy',pos:'n./v.',def:'代理；通过中间服务器转发请求',ex:'Nginx reverse proxy: the traffic cop that nobody thanks until it breaks.'},

  mystic:{
    name:'神秘学 · 命理', icon:'🔮', theme:'mys', progressClass:'mys-progress',
    filterAccent:'var(--mys-accent)',
    words:[
      {word:'arcana',pos:'n.',def:'奥秘，奥义；塔罗牌的阿卡纳（Major Arcana）',ex:'The Fool is card zero—not ignorance, but the courage to step into the unknown.'},
      {word:'oracle',pos:'n.',def:'神谕；传递神圣信息的媒介',ex:'The oracle spoke in riddles. It always does. The answers are yours to unwrap.'},
      {word:'omen',pos:'n.',def:'预兆，征兆',ex:'A crow on the window sill at midnight—whether good omen or bad depends on who\'s asking.'},
      {word:'divine',pos:'adj./v.',def:'神圣的；占卜，预测',ex:'To divine the future is to read the patterns the universe left behind.'},
      {word:'trance',pos:'n.',def:'出神状态；恍惚，入定',ex:'The medium slipped into a trance, her eyes rolling back before the words came.'},
      {word:'vortex',pos:'n.',def:'漩涡；能量的旋流中心',ex:'The vortex of energy swirled above the altar—a tear in the fabric of the mundane.'},
      {word:'pendulum',pos:'n.',def:'摆锤；占卜用的垂摆',ex:'The pendulum swings north-south for yes. East-west for no. Still means ask again.'},
      {word:'zodiac',pos:'n.',def:'黄道十二宫；星座系统',ex:'Your zodiac sign is just the start. The real story is in the houses and aspects.'},
      {word:'eclipse',pos:'n.',def:'日月食；遮蔽天光的天象',ex:'An eclipse is the universe reminding you: even light has its gaps.'},
      {word:'altar',pos:'n.',def:'祭坛，供台',ex:'The altar held a black candle, a quartz crystal, and a feather that smelled of rain.'},
      {word:'sigil',pos:'n.',def:'印记，符文；带有特定意图的符号',ex:'He carved the sigil into the wooden floor—a lock, a key, and a promise.'},
      {word:'lunar',pos:'adj.',def:'月亮的；与月相相关的',ex:'Lunar phases guide the timing of rituals. New moon for beginnings, full for release.'}
    ]
  }
};

/* ─── STATE ─── */
let currentDeck = null, currentFilter = 'all', quizQueue = [], quizIdx = 0, quizCorrect = 0;
const MASTERED_KEY = 'vocab_mastered';
function getMastered(){try{return JSON.parse(localStorage.getItem(MASTERED_KEY)||'{}')}catch(e){return{}}}
function saveMastered(m){localStorage.setItem(MASTERED_KEY,JSON.stringify(m))}
function flipState(word,deck){const k=deck+':'+word;const m=getMastered();return {seen:!!m[k],mastered:m[k]==='mastered'}}

/* ─── RENDER ─── */
function openDeck(deckKey){
  currentDeck = deckKey;
  const d = DECKS[deckKey];
  document.getElementById('landing').style.display='none';
  document.getElementById('game').classList.add('active');
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('gameTitle').textContent = d.icon+' '+d.name;
  currentFilter='all';
  document.querySelectorAll('#filterBar .tag').forEach(t=>t.classList.toggle('active',t.dataset.filter==='all'));
  renderCards();
}

function backToLanding(){
  document.getElementById('game').classList.remove('active');
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('landing').style.display='flex';
}

function renderCards(){
  const d = DECKS[currentDeck];
  const grid = document.getElementById('cardGrid');
  grid.innerHTML='';
  let seen=0,mastered=0,total=0;
  d.words.forEach(w=>{
    const fs = flipState(w.word,currentDeck);
    if(fs.mastered)mastered++;
    if(fs.seen)seen++;
    const pass = currentFilter==='all'||
      (currentFilter==='new'&&!fs.seen)||
      (currentFilter==='seen'&&fs.seen&&!fs.mastered)||
      (currentFilter==='mastered'&&fs.mastered);
    if(!pass)return;
    total++;
    const card = document.createElement('div');
    card.className = `card-wrap ${d.theme}-card${fs.seen?' flipped':''}`;
    card.dataset.word = w.word;
    card.innerHTML = `
      <div class="card-inner" onclick="toggleCard(this)">
        <div class="card-front">
          <div class="word">${w.word}</div>
          <div class="pos">${w.pos}</div>
        </div>
        <div class="card-back">
          <span class="themed-tag">${d.name}</span>
          <div class="def">${w.def}</div>
          <div class="ex">"${w.ex}"</div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('seenCount').textContent='👁️ '+seen;
  document.getElementById('masteredCount').textContent='⭐ '+mastered;
  document.getElementById('gameSubtitle').textContent=`已掌握 ${mastered}/${d.words.length}`;
  // progress
  const pct = d.words.length ? Math.round(mastered/d.words.length*100) : 0;
  document.getElementById('progressBar').className=`progress-bar ${d.progressClass}`;
  document.getElementById('progressFill').style.width=pct+'%';
}

function toggleCard(el){
  const wrap = el.closest('.card-wrap');
  if(wrap.classList.contains('flipped'))return;
  wrap.classList.add('flipped');
  const word = wrap.dataset.word;
  const m = getMastered();
  m[currentDeck+':'+word]='seen';
  saveMastered(m);
  // slight delay then mark srs mastery option
  setTimeout(()=>{
    if(confirm(`掌握 "${word}" 了吗？\n点「确定」标记为⭐掌握，点「取消」仅为已阅`)){
      const m2 = getMastered();
      m2[currentDeck+':'+word]='mastered';
      saveMastered(m2);
    }
    renderCards();
  },800);
}

function setFilter(el,f){
  currentFilter=f;
  document.querySelectorAll('#filterBar .tag').forEach(t=>t.classList.toggle('active',t.dataset.filter===f));
  renderCards();
}

function flipAll(){
  document.querySelectorAll('.card-wrap:not(.flipped)').forEach(w=>{
    w.classList.add('flipped');
    const word = w.dataset.word;
    const m = getMastered();
    if(!m[currentDeck+':'+word])m[currentDeck+':'+word]='seen';
    saveMastered(m);
  });
  setTimeout(renderCards,600);
}

function resetDeck(){
  if(!confirm(`重置 "${DECKS[currentDeck].name}" 的进度？`))return;
  const m = getMastered();
  Object.keys(m).forEach(k=>{if(k.startsWith(currentDeck+':'))delete m[k]});
  saveMastered(m);
  renderCards();
}

/* ─── QUIZ ─── */
function startQuiz(){
  const d = DECKS[currentDeck];
  const mastered = getMastered();
  const pool = d.words.filter(w=>mastered[currentDeck+':'+w.word]==='mastered');
  if(pool.length<4){
    alert(`至少需要掌握 4 个词才能开始测试喵～当前掌握了 ${pool.length} 个`);
    return;
  }
  // shuffle pool, pick up to 10
  const shuffled = [...pool].sort(()=>Math.random()-.5);
  quizQueue = shuffled.slice(0,Math.min(10,shuffled.length));
  quizIdx=0; quizCorrect=0;
  document.getElementById('game').classList.remove('active');
  document.getElementById('quiz').classList.add('active');
  showQuizQ();
}

function exitQuiz(){
  document.getElementById('quiz').classList.remove('active');
  document.getElementById('game').classList.add('active');
  renderCards();
}

function showQuizQ(){
  const item = quizQueue[quizIdx];
  if(!item){finishQuiz();return;}
  document.getElementById('qWord').textContent = item.word;
  document.getElementById('qPos').textContent = item.pos;
  document.getElementById('quizScore').textContent = `${quizCorrect}/${quizQueue.length}`;
  // build options: correct + 3 random from same deck (not same word)
  const d = DECKS[currentDeck];
  let options = [item.def];
  const others = d.words.filter(w=>w.word!==item.word).sort(()=>Math.random()-.5);
  for(let i=0;i<3&&i<others.length;i++)options.push(others[i].def);
  options = options.sort(()=>Math.random()-.5);
  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  options.forEach(def=>{
    const btn = document.createElement('button');
    btn.textContent = def;
    btn.onclick = ()=>answerQuiz(btn,def===item.def);
    container.appendChild(btn);
  });
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display='none';
}

function answerQuiz(btn,correct){
  document.querySelectorAll('#quizOptions button').forEach(b=>b.onclick=null);
  if(correct){
    btn.classList.add('correct');
    quizCorrect++;
    document.getElementById('quizResult').textContent='✅ 正确！';
    document.getElementById('quizResult').style.color='var(--dev-green)';
  } else {
    btn.classList.add('wrong');
    // highlight correct
    document.querySelectorAll('#quizOptions button').forEach(b=>{
      if(b.textContent===DECKS[currentDeck].words.find(w=>w.word===quizQueue[quizIdx].word).def)
        b.classList.add('correct');
    });
    document.getElementById('quizResult').textContent='❌ 再想想～';
    document.getElementById('quizResult').style.color='var(--df-red)';
  }
  document.getElementById('quizScore').textContent = `${quizCorrect}/${quizQueue.length}`;
  document.getElementById('quizNext').style.display='inline-block';
}

function nextQuiz(){
  quizIdx++;
  if(quizIdx>=quizQueue.length){finishQuiz();return;}
  showQuizQ();
}

function finishQuiz(){
  const total = quizQueue.length;
  const pct = Math.round(quizCorrect/total*100);
  const msg = pct>=80?'🎉 太棒了！' : pct>=60?'👍 还不错～' : '💪 继续加油！';
  document.getElementById('qWord').textContent = msg;
  document.getElementById('qPos').textContent = '';
  document.getElementById('quizOptions').innerHTML = '';
  document.getElementById('quizResult').innerHTML = `<div style="font-size:1.5rem;margin:16px 0">${quizCorrect}/${total} (${pct}%)</div><div style="color:var(--text2);font-size:.9rem">正确率 ${pct}%</div>`;
  document.getElementById('quizNext').textContent = '🔙 返回词库';
  document.getElementById('quizNext').onclick = exitQuiz;
  document.getElementById('quizNext').style.display='inline-block';
}

/* ─── BOOT ─── */
setTimeout(()=>document.getElementById('load').classList.add('hide'),800);
</script>
