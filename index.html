<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地月专属 · 领域四级词库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Special+Elite&family=Orbitron:wght@400;700;900&family=Major+Mono+Display&family=Fira+Code:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0a0f;font-family:'Noto Serif SC',serif;overflow-x:hidden;color:#e0dcd0;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0a0f;--surface:#14141e;--surface2:#1c1c2a;--text:#e0dcd0;--text2:#908a78;--df-red:#c62828;--df-gold:#b8860b;--fgo-gold:#d4a017;--fgo-blue:#1a237e;--dev-green:#00ff41;--dev-bg:#0d1117;--mys-purple:#7b2d8e;--mys-accent:#bb86fc}
#load{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .6s}
#load.hide{opacity:0;pointer-events:none}
.load-ring{width:64px;height:64px;border:3px solid #2a2a3e;border-top-color:var(--dev-green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
#landing .title{font-size:clamp(1.8rem,5vw,3.2rem);text-align:center;margin-bottom:8px}
#landing .title span{display:block;font-size:clamp(.85rem,2vw,1.1rem);color:var(--text2);font-weight:400;margin-top:8px;letter-spacing:2px}
#landing .title .em{color:var(--dev-green);font-family:'Major Mono Display',monospace}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1080px;width:100%;margin-top:48px}
.deck-card{position:relative;border-radius:16px;padding:32px 24px 24px;cursor:pointer;transition:all .4s cubic-bezier(.22,1,.36,1);overflow:hidden;border:1px solid transparent;min-height:200px;display:flex;flex-direction:column;justify-content:flex-end}
.deck-card:hover{transform:translateY(-8px) scale(1.02)}
.deck-card .icon{font-size:2.4rem;margin-bottom:12px;position:relative;z-index:1}
.deck-card h2{font-size:1.3rem;position:relative;z-index:1}
.deck-card p{font-size:.8rem;color:var(--text2);margin-top:6px;position:relative;z-index:1}
.deck-card .count{position:absolute;top:16px;right:20px;font-size:.75rem;opacity:.5;font-family:'Fira Code',monospace}
.df-theme{background:linear-gradient(145deg,#1a0a0a,#0d0505);border-color:#3a1515}
.df-theme:hover{border-color:var(--df-red);box-shadow:0 12px 40px rgba(198,40,40,.2)}
.df-theme .icon{color:var(--df-red)}
.fgo-theme{background:linear-gradient(145deg,#0a0f2a,#05081a);border-color:#1a237e}
.fgo-theme:hover{border-color:var(--fgo-gold);box-shadow:0 12px 40px rgba(212,160,23,.2)}
.fgo-theme .icon{color:var(--fgo-gold)}
.dev-theme{background:linear-gradient(145deg,#0d1117,#06090f);border-color:#1a2a1a}
.dev-theme:hover{border-color:var(--dev-green);box-shadow:0 12px 40px rgba(0,255,65,.15)}
.dev-theme .icon{color:var(--dev-green)}
.mys-theme{background:linear-gradient(145deg,#120824,#080412);border-color:#2a1a3a}
.mys-theme:hover{border-color:var(--mys-purple);box-shadow:0 12px 40px rgba(123,45,142,.25)}
.mys-theme .icon{color:var(--mys-accent)}
#game{display:none;min-height:100vh;padding:20px}
#game.active{display:block}
.game-header{display:flex;align-items:center;gap:16px;padding:16px 0;max-width:1080px;margin:0 auto 24px;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
.game-header .back{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:8px;transition:color .3s;font-family:inherit}
.game-header .back:hover{color:var(--text)}
.game-header h1{font-size:1.4rem;flex:1}
.game-header h1 small{display:block;font-size:.75rem;color:var(--text2);font-weight:400}
.game-stats{display:flex;gap:16px;font-size:.8rem;font-family:'Fira Code',monospace;color:var(--text2)}
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;max-width:1080px;margin:0 auto 24px}
.filter-bar .tag{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 16px;font-size:.78rem;cursor:pointer;transition:all .3s;color:var(--text2);font-family:inherit}
.filter-bar .tag:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.filter-bar .tag.active{background:var(--surface2);border-color:currentColor;color:var(--text)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;max-width:1080px;margin:0 auto;perspective:1000px}
.card-wrap{aspect-ratio:3/4;cursor:pointer;perspective:800px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.22,1,.36,1);transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;text-align:center;border:1px solid rgba(255,255,255,.08);overflow:hidden}
.card-front{background:var(--surface)}
.card-front .word{font-size:1.15rem;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.card-front .pos{font-size:.7rem;opacity:.5;font-family:'Fira Code',monospace}
.card-back{transform:rotateY(180deg);background:var(--surface2);gap:6px}
.card-back .def{font-size:.85rem;line-height:1.5;color:var(--text)}
.card-back .ex{font-size:.72rem;color:var(--text2);line-height:1.5;margin-top:4px;font-style:italic}
.card-back .themed-tag{position:absolute;top:8px;right:10px;font-size:.6rem;padding:2px 8px;border-radius:10px;opacity:.7;font-family:'Fira Code',monospace}
.df-card .card-front{background:linear-gradient(180deg,#1a0808,#0f0404);border-color:#3a1515}
.df-card .card-back{background:linear-gradient(180deg,#1a0a0a,#120606);border-color:#4a2020}
.df-card .card-back .def{color:#ffaaaa}
.df-card .themed-tag{background:rgba(198,40,40,.3);color:var(--df-red)}
.fgo-card .card-front{background:linear-gradient(180deg,#0a0f2a,#05081a);border-color:#1a237e}
.fgo-card .card-back{background:linear-gradient(180deg,#0c1230,#070a20);border-color:#2a307e}
.fgo-card .card-back .def{color:#ffe082}
.fgo-card .themed-tag{background:rgba(212,160,23,.25);color:var(--fgo-gold)}
.dev-card .card-front{background:linear-gradient(180deg,#0d1117,#080b10);border-color:#1a2a1a}
.dev-card .card-back{background:linear-gradient(180deg,#0f1419,#090c12);border-color:#2a3a2a}
.dev-card .card-back .def{color:#7affa0}
.dev-card .themed-tag{background:rgba(0,255,65,.15);color:var(--dev-green)}
.mys-card .card-front{background:linear-gradient(180deg,#120824,#0a0418);border-color:#2a1a3a}
.mys-card .card-back{background:linear-gradient(180deg,#140a28,#0c051e);border-color:#3a2a4a}
.mys-card .card-back .def{color:#d0a0ff}
.mys-card .themed-tag{background:rgba(123,45,142,.3);color:var(--mys-accent)}
#quiz{display:none;min-height:100vh;padding:20px}
#quiz.active{display:block}
.quiz-box{max-width:640px;margin:80px auto;background:var(--surface);border-radius:20px;padding:48px 32px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.quiz-box .q-word{font-size:2rem;font-weight:700;margin-bottom:16px}
.quiz-box .q-pos{font-size:.8rem;color:var(--text2);margin-bottom:32px;font-family:'Fira Code',monospace}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:480px;margin:0 auto}
.quiz-options button{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;font-size:.85rem;color:var(--text);cursor:pointer;transition:all .3s;font-family:inherit;text-align:left;line-height:1.4}
.quiz-options button:hover{border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.quiz-options button.correct{background:rgba(0,255,65,.15);border-color:var(--dev-green)}
.quiz-options button.wrong{background:rgba(198,40,40,.15);border-color:var(--df-red)}
.quiz-result{margin-top:24px;font-size:1.1rem;min-height:2em}
.quiz-next{display:none;margin:24px auto 0;background:none;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 28px;color:var(--text);cursor:pointer;font-family:inherit;transition:all .3s}
.quiz-next:hover{background:var(--surface2);border-color:rgba(255,255,255,.25)}
.quiz-header{display:flex;align-items:center;gap:16px;max-width:640px;margin:0 auto 24px}
.quiz-header .back{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:8px;font-family:inherit}
.quiz-header .back:hover{color:var(--text)}
.quiz-header h1{font-size:1.2rem;flex:1}
.quiz-header .score{font-family:'Fira Code',monospace;font-size:.85rem;color:var(--text2)}
.action-row{display:flex;gap:12px;max-width:1080px;margin:24px auto 0;flex-wrap:wrap}
.action-row button{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 20px;color:var(--text);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .3s}
.action-row button:hover{background:var(--surface2);border-color:rgba(255,255,255,.2)}
.action-row .quiz-btn{background:rgba(123,45,142,.2);border-color:var(--mys-purple)}
.action-row .quiz-btn:hover{background:rgba(123,45,142,.35);box-shadow:0 0 20px rgba(123,45,142,.2)}
.action-row .reset-btn{background:rgba(198,40,40,.1);border-color:#3a1515}
.action-row .reset-btn:hover{background:rgba(198,40,40,.2)}
.action-row .shuffle-btn{background:rgba(0,255,65,.08);border-color:#1a3a1a}
.action-row .shuffle-btn:hover{background:rgba(0,255,65,.15)}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;max-width:1080px;margin:12px auto 0}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.22,1,.36,1);width:0%}
.df-progress .fill{background:var(--df-red)}
.fgo-progress .fill{background:var(--fgo-gold)}
.dev-progress .fill{background:var(--dev-green)}
.mys-progress .fill{background:var(--mys-accent)}

/* Mastery badge animation */
.mastery-badge{position:absolute;top:-4px;right:-4px;font-size:.9rem;animation:pop .3s cubic-bezier(.68,-.55,.265,1.55)}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

/* Toast message */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 24px;font-size:.85rem;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.df-msg{border-color:var(--df-red);color:#ffaaaa}
.toast.fgo-msg{border-color:var(--fgo-gold);color:#ffe082}
.toast.dev-msg{border-color:var(--dev-green);color:#7affa0}
.toast.mys-msg{border-color:var(--mys-accent);color:#d0a0ff}

@media(max-width:600px){
  .deck-grid{grid-template-columns:1fr 1fr;gap:12px}
  .deck-card{min-height:160px;padding:20px 16px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .quiz-options{grid-template-columns:1fr}
  .quiz-box{padding:32px 20px;margin:40px auto}
}
</style>
</head>
<body>

<div id="load"><div class="load-ring"></div><div style="font-size:.8rem;color:var(--text2);letter-spacing:2px;">加载领域词库中...</div></div>

<section id="landing">
  <div class="title">🗂️ 地月专属 · 领域词库 <span>四级词汇嵌入你的世界 · <span class="em">word</span> 即记忆</span></div>
  <div class="deck-grid" id="deckGrid"></div>
</section>

<section id="game">
  <div class="game-header">
    <button class="back" onclick="backToLanding()">←</button>
    <h1 id="gameTitle">领域名 <small id="gameSubtitle">已掌握 0/0</small></h1>
    <div class="game-stats"><span id="seenCount">👁️ 0</span><span id="masteredCount">⭐ 0</span></div>
  </div>
  <div class="filter-bar" id="filterBar">
    <span class="tag active" data-filter="all" onclick="setFilter(this,'all')">全部</span>
    <span class="tag" data-filter="new" onclick="setFilter(this,'new')">📖 未翻</span>
    <span class="tag" data-filter="seen" onclick="setFilter(this,'seen')">👁️ 已阅</span>
    <span class="tag" data-filter="mastered" onclick="setFilter(this,'mastered')">⭐ 掌握</span>
  </div>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="action-row">
    <button onclick="startQuiz()" class="quiz-btn">🎯 测试模式</button>
    <button onclick="flipAll()">🔄 全部翻面</button>
    <button onclick="shuffleCards()" class="shuffle-btn">🔀 洗牌</button>
    <button onclick="resetDeck()" class="reset-btn">🔄 重置进度</button>
  </div>
</section>

<section id="quiz">
  <div class="quiz-header">
    <button class="back" onclick="exitQuiz()">←</button>
    <h1>🎯 测试</h1>
    <span class="score" id="quizScore">0/0</span>
  </div>
  <div class="quiz-box" id="quizBox">
    <div class="q-word" id="qWord">word</div>
    <div class="q-pos" id="qPos">n.</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuiz()">下一题 →</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
const DECKS = {
  darkfantasy:{
    name:'黑暗幻想',icon:'🗡️',theme:'df',progressClass:'df-progress',filterAccent:'var(--df-red)',
    desc:'血腥、献祭、裂缝中的低语——你笔下的世界',
    words:[
      ["ritual","n.","献祭仪式，一套带有目的性且通常血腥的固定行为","The cult performed its ritual under the eclipse, and the air thickened with copper."],
      ["wound","n./v.","（深处的）伤口；施加创伤","The wound gaped like a second mouth, its edges already blackening."],
      ["crawl","v.","（贴着地面）爬行，缓慢移动","He crawled across the blood-soaked flagstones, fingers leaving wet trails."],
      ["blade","n.","剑刃，刀锋","The blade caught the torchlight—a streak of hunger in the dark."],
      ["sacrifice","n./v.","献祭；牺牲品","Sacrifice was never a choice here. Only a matter of who bled first."],
      ["shadow","n./v.","暗影；投下阴影","The shadows moved against the torchlight—or was it the other way around?"],
      ["flesh","n.","（人或动物的）血肉，肉体","The flesh remembers every cut. The mind just learns to live with the memory."],
      ["dread","n./v.","深入骨髓的恐惧","A cold dread settled in his chest, heavier than any blade."],
      ["hollow","adj./v.","空洞的；（使）空虚","His eyes were hollow—not dead, just no longer home to anything human."],
      ["fester","v.","（伤口）化脓溃烂；（怨恨）郁积","The wound festered in the damp, and with it, his hatred."],
      ["decay","n./v.","腐朽，衰败","The castle smelled of decay—wet stone, rotting wood, something older."],
      ["tremble","v.","（因恐惧/寒冷）颤抖","Her hands trembled, but her voice did not. That was how he knew she'd already won."],
      ["abyss","n.","深渊；不可测的深处","He stared into the abyss long enough that it started staring back through his own eyes."],
      ["curse","n./v.","诅咒；使受诅咒","The curse wasn't death—it was living forever, watching everyone else die."],
      ["corpse","n.","尸体，死尸","The corpse sat upright in the chair, as if still waiting for the tea to cool."],
      ["dagger","n.","短剑，匕首","She palmed the dagger—a habit born from years of trusting the wrong people."],
      ["phantom","n.","幽灵，幻影；萦绕不去的东西","The phantom of her voice lingered in the hallway long after she'd gone."],
      ["savage","adj./n./v.","野蛮的；残暴攻击","The savagery of the attack left nothing intact—not even the silence."],
      ["agony","n.","（极度的）痛苦，折磨","His agony was written in the way every muscle screamed at once."],
      ["brutal","adj.","残忍的，毫不留情的","The winter was brutal that year. It took the old, the weak, and the unlucky."],
      ["casket","n.","棺材；小匣子","They lowered the casket into mud that didn't even try to hide its hunger."],
      ["howl","n./v.","（因痛苦/愤怒）嚎叫","The howl came from somewhere deep in the forest—or from somewhere deep in him."],
      ["lurk","v.","潜伏，隐藏等待","Something lurked beneath the still water. The ripples told the truth the surface hid."],
      ["mortal","adj./n.","凡人的；会死的","The gods made one mistake: they forgot what mortals do when they have nothing left to lose."],
      ["pierce","v.","刺穿，穿透","The arrow pierced his shoulder, pinning him to the oak like an offering."],
      ["scar","n./v.","伤疤；留下精神创伤","The scar across his palm was a daily reminder that some bargains cost more than blood."],
      ["stench","n.","恶臭，腐臭味","The stench of rot hit him before the sight did. He wished it hadn't."],
      ["torment","n./v.","折磨，精神上的酷刑","The memories came back to torment him every night, punctual as a clockwork curse."],
      ["vigil","n.","守夜，不眠的守望","She kept vigil over his body until dawn, hoping for a miracle that never came."],
      ["whisper","n./v.","低语；秘密流传","The walls whispered in a language older than the stones they were made of."],
      ["wrath","n.","（神的）愤怒，天谴","The wrath of something ancient descended upon them—not lightning, but silence."],
      ["chasm","n.","（地面/信仰/关系的）深裂","Between what he said and what he meant lay a chasm no bridge could span."],
      ["dusk","n.","黄昏，薄暮","Dusk was her favorite hour—when the boundary between worlds wore thin as paper."],
      ["exile","n./v.","流放；自我放逐","Exile was his choice. Better banishment than watching what his home had become."],
      ["gash","n./v.","（深的）切口，划伤","The gash across his ribs was deep enough to show bone. He kept walking."],
      ["haunt","v./n.","（鬼魂/记忆）出没；常去的地方","The manor was haunted—not by ghosts, but by the weight of everything that had happened there."],
      ["immortal","adj./n.","不朽的，长生不死的","Immortality wasn't a gift. It was a prison with no walls and no release."],
      ["lament","v./n.","哀悼；悲叹","She lamented not his death, but the way he'd chosen to live."],
      ["menace","n./v.","威胁；具有危险性的人/物","There was a menace in his stillness—a predator's patience."],
      ["omen","n.","预兆，征兆","The raven at the window was an omen. The question was: of what?"],
      ["plague","n./v.","瘟疫；困扰","The plague swept through the village like a bored god cleaning house."],
      ["shriek","n./v.","尖叫，刺耳的声音","The shriek tore through the night—half human, half something that had forgotten how to be."],
      ["sorrow","n.","悲伤，哀愁","Her sorrow had weight. You could feel it in the room like a piece of furniture no one would sit on."],
      ["throne","n.","王座；权力的象征","The throne was empty. That was the scariest part."],
      ["vile","adj.","邪恶的；令人作呕的","He did vile things—not because he enjoyed them, but because the voice told him to."],
      ["anguish","n.","身心上的剧痛，苦闷","Anguish twisted her face into something her own mother wouldn't recognize."],
      ["coffin","n.","棺材","They nailed the coffin shut, but they couldn't nail the silence."],
      ["damned","adj./v.","该下地狱的；被诅咒的","The damned souls didn't scream—they just stared, and that was worse."],
      ["ember","n.","余烬，未熄的火","The embers glowed like the last heartbeat of a dying world."],
      ["frenzy","n.","狂暴，疯狂","In his frenzy, he couldn't tell friend from foe. Everyone was just meat."],
      ["hatred","n.","刻骨的仇恨","Hatred was a language she spoke fluently. Love was the foreign tongue."],
      ["lair","n.","（野兽的）巢穴，躲藏处","The beast's lair was littered with bones—each one a story that ended too soon."],
      ["noose","n.","绞索，套索","The noose swung gently in the wind—patient, as if it had all the time in the world."],
      ["rot","v./n.","腐烂，腐朽","The rot started at the foundation. By the time they noticed, the whole building was unsound."],
      ["slaughter","n./v.","屠杀；大范围杀戮","The slaughter lasted three hours. The clean-up took three days."],
      ["tomb","n.","坟墓，陵墓","The tomb wasn't sealed to keep people out. It was sealed to keep something in."],
      ["vengeance","n.","复仇，报复","Vengeance was a dish he'd waited thirty years to serve cold."],
      ["yearn","v.","渴望，强烈思念","She yearned for a peace she'd never known, in a world that didn't know how to give it."],
